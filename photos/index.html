---
layout: default
title: Photos
banner_image: /assets/photos/sydney.jpg
banner_alt: View from Taronga Zoo
banner_caption: Sydney, Australia
---

<section class="container photos-page">
    <h1>Photos</h1>
    <p>A small collection of places I have been.</p>

    <div class="photo-grid">
        {% for photo in site.data.photos %}
        <figure class="photo-card">
            <button
                class="photo-trigger"
                type="button"
                data-full="{{ photo.image | relative_url }}"
                data-alt="{{ photo.alt | escape }}"
                data-caption="{{ photo.caption | escape }}"
            >
                <img src="{{ photo.image | relative_url }}" alt="{{ photo.alt | escape }}">
            </button>
            <figcaption>{{ photo.caption }}</figcaption>
        </figure>
        {% endfor %}
    </div>

    <dialog class="photo-dialog" data-photo-dialog aria-label="Expanded photo">
        <button class="photo-dialog-close" type="button" aria-label="Close expanded photo"></button>
        <img data-photo-dialog-image alt="">
        <p data-photo-dialog-caption></p>
    </dialog>
</section>

<script>
    const photoDialog = document.querySelector("[data-photo-dialog]");
    const photoDialogImage = document.querySelector("[data-photo-dialog-image]");
    const photoDialogCaption = document.querySelector("[data-photo-dialog-caption]");
    const photoDialogClose = document.querySelector(".photo-dialog-close");

    document.querySelectorAll(".photo-trigger").forEach((trigger) => {
        trigger.addEventListener("click", () => {
            photoDialogImage.src = trigger.dataset.full;
            photoDialogImage.alt = trigger.dataset.alt;
            photoDialogCaption.textContent = trigger.dataset.caption;

            if (typeof photoDialog.showModal === "function") {
                photoDialog.showModal();
            } else {
                photoDialog.setAttribute("open", "");
            }
        });
    });

    photoDialogClose.addEventListener("click", () => {
        photoDialog.close();
    });

    photoDialog.addEventListener("click", (event) => {
        if (event.target === photoDialog) {
            photoDialog.close();
        }
    });
</script>
