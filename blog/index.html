---
layout: default
title: Blog
---

<section class="container">
    <h1>Blog</h1>

    <div class="post-list">
        {% for post in site.posts %}
            <article>
                <p class="post-meta">{{ post.date | date: "%-d %B %Y" }}</p>
                <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
                <p>{{ post.excerpt | strip_html | truncate: 180 }}</p>
            </article>
        {% endfor %}
    </div>
</section>
